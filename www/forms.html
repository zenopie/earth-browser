<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Forms Test — Earth Browser</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Form Interaction</h1>
        <p class="tagline">All interaction via HTML forms — no JavaScript required.</p>

        <div class="info">
            <h2>Search</h2>
            <form method="POST" action="/cgi-bin/search.py">
                <input type="text" name="q" placeholder="Search..." style="padding: 8px; width: 70%; background: #0a0e17; border: 1px solid #2a3a50; color: #c8d0df; border-radius: 4px;">
                <button type="submit" style="padding: 8px 16px; background: #1a3a28; border: 1px solid #2a5a3a; color: #48bb78; border-radius: 4px; cursor: pointer;">Search</button>
            </form>
        </div>

        <div class="info">
            <h2>Guestbook</h2>
            <form method="POST" action="/cgi-bin/guestbook.py">
                <div style="margin-bottom: 8px;">
                    <input type="text" name="name" placeholder="Your name" style="padding: 8px; width: 100%; background: #0a0e17; border: 1px solid #2a3a50; color: #c8d0df; border-radius: 4px;">
                </div>
                <div style="margin-bottom: 8px;">
                    <textarea name="message" placeholder="Leave a message..." rows="3" style="padding: 8px; width: 100%; background: #0a0e17; border: 1px solid #2a3a50; color: #c8d0df; border-radius: 4px; resize: vertical;"></textarea>
                </div>
                <button type="submit" style="padding: 8px 16px; background: #1a3a28; border: 1px solid #2a5a3a; color: #48bb78; border-radius: 4px; cursor: pointer;">Post</button>
            </form>
        </div>

        <div class="info">
            <h2>Settings</h2>
            <form method="POST" action="/forms.html">
                <label style="display: block; margin-bottom: 6px;">
                    <input type="checkbox" name="darkmode" value="on" checked> Dark mode
                </label>
                <label style="display: block; margin-bottom: 6px;">
                    <input type="checkbox" name="notifications" value="on"> Notifications
                </label>
                <select name="language" style="padding: 6px; background: #0a0e17; border: 1px solid #2a3a50; color: #c8d0df; border-radius: 4px; margin-bottom: 8px;">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                </select>
                <br>
                <button type="submit" style="padding: 8px 16px; background: #1a3a28; border: 1px solid #2a5a3a; color: #48bb78; border-radius: 4px; cursor: pointer;">Save Settings</button>
            </form>
        </div>

        <p><a href="/">&larr; Back to home</a></p>

        <footer>
            <p>Earth Browser — all interaction works without JavaScript</p>
        </footer>
    </div>
</body>
</html>
