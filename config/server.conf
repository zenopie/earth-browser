# Earth Browser — Reticulum Server Config
#
# Run this on the machine hosting earthserv.
# Listens for both local and remote Reticulum connections.

[reticulum]
  enable_transport = True
  share_instance = Yes
  shared_instance_port = 37428
  instance_control_port = 37429

[interfaces]
  # Local connections (earthproxy on same machine)
  [[Local]]
    type = TCPServerInterface
    interface_enabled = True
    listen_ip = 127.0.0.1
    listen_port = 4242

  # Remote connections (other machines over the internet)
  [[Internet]]
    type = TCPServerInterface
    interface_enabled = True
    listen_ip = 0.0.0.0
    listen_port = 4243
