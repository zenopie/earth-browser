# Earth Browser — Reticulum Client Config
#
# This is the default config for browsing. It connects to the Reticulum
# network but does NOT accept incoming connections.
#
# To connect to a specific server, add a TCPClientInterface:
#
#   [[My Server]]
#     type = TCPClientInterface
#     interface_enabled = True
#     target_host = SERVER_IP
#     target_port = 4243

[reticulum]
  enable_transport = False
  share_instance = Yes
  shared_instance_port = 37428
  instance_control_port = 37429

[interfaces]
  # Local only — earthproxy and other local Reticulum apps
  [[Local]]
    type = TCPServerInterface
    interface_enabled = True
    listen_ip = 127.0.0.1
    listen_port = 4242
