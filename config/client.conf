# Earth Browser — Reticulum Client Config
#
# Run this on the machine running earthproxy (the browser side).
# Connects to a remote earthserv host over TCP.
#
# Replace SERVER_IP with the IP address of the machine running earthserv.

[reticulum]
  enable_transport = False
  share_instance = Yes
  shared_instance_port = 37428
  instance_control_port = 37429

[interfaces]
  # Local connections
  [[Local]]
    type = TCPServerInterface
    interface_enabled = True
    listen_ip = 127.0.0.1
    listen_port = 4242

  # Connect to remote earthserv host
  [[Remote Server]]
    type = TCPClientInterface
    interface_enabled = True
    target_host = SERVER_IP
    target_port = 4243
