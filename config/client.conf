# Earth Browser — Reticulum Client Config
#
# Connects to the Earth Network, discovers peers via gossip,
# and can route traffic without the bootstrap once peers are known.

[reticulum]
  enable_transport = True
  share_instance = Yes
  shared_instance_port = 37428
  instance_control_port = 37429
  interface_discovery_sources = Earth Network

[interfaces]
  # Local connections
  [[Local]]
    type = TCPServerInterface
    interface_enabled = True
    listen_ip = 127.0.0.1
    listen_port = 4242

  # Earth Network bootstrap node — used for initial connection,
  # discovery finds additional peers automatically
  [[Earth Network]]
    type = TCPClientInterface
    interface_enabled = True
    target_host = gold-gecko.vm.scrtlabs.com
    target_port = 4243
